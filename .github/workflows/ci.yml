name: MellowDLP CI

on: [push, pull_request]

jobs:
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "import server; import downloader; import analytics; print('imports OK')"
      - name: Run tests
        run: python -m pytest tests/ -v --timeout=30
        continue-on-error: true

  test-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "import server; import downloader; import analytics; print('imports OK')"

  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Check imports
        run: python -c "import server; import downloader; import analytics; print('imports OK')"

  build-linux:
    runs-on: ubuntu-latest
    needs: test-linux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system deps
        run: sudo apt-get install -y ffmpeg wget

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install esbuild
        run: npm install -g esbuild

      - name: Install Python deps
        run: pip install -r requirements.txt pyinstaller pillow

      - name: Download yt-dlp
        run: |
          wget -q "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp" -O yt-dlp
          chmod +x yt-dlp

      - name: Build
        run: python3 build_setup.py

      - name: Upload ELF binary
        uses: actions/upload-artifact@v4
        with:
          name: MellowDLP-linux-x86_64
          path: dist/MellowDLP
          retention-days: 7
          if-no-files-found: error

      - name: Upload AppImage (if built)
        uses: actions/upload-artifact@v4
        with:
          name: MellowDLP-linux-AppImage
          path: dist/MellowDLP-*.AppImage
          retention-days: 7
          if-no-files-found: ignore
